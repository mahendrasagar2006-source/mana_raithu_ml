<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mana Raithu - Crop Recommendation</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">

  <div class="brandbar">
    <div class="mark">🌾</div>
    <div class="name">Mana Raithu</div>
  </div>

  <div class="card">
    <div class="card-inner">

      <h1 class="title">Crop Recommendation</h1>
      <p class="subtitle">Tell us about your field — we'll suggest what to grow</p>
      <div class="furrow"></div>

      {% if error %}
      <div class="error">{{ error }}</div>
      {% endif %}

      <form action="/predict" method="POST">

        <p class="section-label">Location &amp; Season</p>
        <div class="row">
          <div class="form-group">
            <label for="state">State</label>
            <select id="state" name="state" required>
              {% for s in states %}
              <option value="{{ s }}">{{ s }}</option>
              {% endfor %}
            </select>
          </div>
          <div class="form-group">
            <label for="season">Season</label>
            <select id="season" name="season" required>
              {% for s in seasons %}
              <option value="{{ s }}">{{ s }}</option>
              {% endfor %}
            </select>
          </div>
        </div>

        <p class="section-label">Soil &amp; Water</p>
        <div class="row">
          <div class="form-group">
            <label for="soil_type">Soil Type</label>
            <select id="soil_type" name="soil_type" required>
              {% for s in soil_types %}
              <option value="{{ s }}">{{ s }}</option>
              {% endfor %}
            </select>
          </div>
          <div class="form-group">
            <label for="water_availability">Water Availability</label>
            <select id="water_availability" name="water_availability" required>
              {% for w in water_availabilities %}
              <option value="{{ w }}">{{ w }}</option>
              {% endfor %}
            </select>
          </div>
        </div>

        <p class="section-label">Crop History</p>
        <div class="form-group">
          <label for="previous_crop">Previous Crop</label>
          <select id="previous_crop" name="previous_crop" required>
            {% for c in previous_crops %}
            <option value="{{ c }}">{{ c }}</option>
            {% endfor %}
          </select>
        </div>

        <p class="section-label">Land &amp; Weather</p>
        <div class="row">
          <div class="form-group">
            <label for="land_area">Land Area (Acres)</label>
            <input type="number" id="land_area" step="1" min="1" name="land_area" required>
          </div>
          <div class="form-group">
            <label for="temperature">Temperature (°C)</label>
            <input type="number" id="temperature" step="0.1" name="temperature" required>
          </div>
        </div>
        <div class="form-group">
          <label for="rainfall">Rainfall (mm)</label>
          <input type="number" id="rainfall" step="1" name="rainfall" required>
        </div>

        <button type="submit" class="submit">Get Recommendation</button>

      </form>

    </div>
  </div>

</div>

</body>
</html>
