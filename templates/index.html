<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mana Raithu - Fertilizer Recommendation</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,Tahoma,sans-serif;
}

body{
background:#e8f5e9;
padding:30px;
}

.container{
max-width:700px;
margin:auto;
}

.card{
background:#fff;
padding:30px;
border-radius:12px;
box-shadow:0 0 15px rgba(0,0,0,.15);
}

h1{
text-align:center;
color:#2e7d32;
margin-bottom:5px;
}

.subtitle{
text-align:center;
color:#555;
margin-bottom:25px;
}

.form-group{
margin-bottom:18px;
}

label{
display:block;
font-weight:600;
margin-bottom:6px;
}

input,select{

width:100%;
padding:12px;
border-radius:8px;
border:2px solid #ccc;
font-size:15px;

}

input:focus,
select:focus{

border-color:#4CAF50;
outline:none;

}

.row{

display:flex;
gap:15px;

}

.row .form-group{

flex:1;

}

button{

width:100%;
padding:15px;
border:none;
background:#4CAF50;
color:white;
font-size:17px;
font-weight:bold;
border-radius:8px;
cursor:pointer;
margin-top:10px;

}

button:hover{

background:#388e3c;

}

.error{

background:#ffebee;
padding:12px;
margin-bottom:20px;
color:#c62828;
border-radius:8px;
text-align:center;

}

@media(max-width:600px){

.row{

flex-direction:column;

}

}

</style>

</head>

<body>

<div class="container">

<div class="card">

<h1>🌾 Mana Raithu</h1>

<p class="subtitle">
Fertilizer Recommendation System
</p>

{% if error %}

<div class="error">

{{ error }}

</div>

{% endif %}

<form action="/predict" method="POST">

<div class="row">

<div class="form-group">

<label>Temperature (°C)</label>

<input
type="number"
step="0.1"
name="temperature"
required>

</div>

<div class="form-group">

<label>Humidity (%)</label>

<input
type="number"
step="0.1"
name="humidity"
required>

</div>

</div>

<div class="row">

<div class="form-group">

<label>Moisture (%)</label>

<input
type="number"
step="0.1"
name="moisture"
required>

</div>

<div class="form-group">

<label>Nitrogen (N)</label>

<input
type="number"
step="0.1"
name="nitrogen"
required>

</div>

</div>

<div class="row">

<div class="form-group">

<label>Potassium (K)</label>

<input
type="number"
step="0.1"
name="potassium"
required>

</div>

<div class="form-group">

<label>Phosphorous (P)</label>

<input
type="number"
step="0.1"
name="phosphorous"
required>

</div>

</div>

<div class="form-group">

<label>Soil Type</label>

<select
name="soil_type"
required>

{% for soil in soil_types %}

<option value="{{ soil }}">

{{ soil }}

</option>

{% endfor %}

</select>

</div>

<div class="form-group">

<label>Crop Type</label>

<select
name="crop_type"
required>

{% for crop in crop_types %}

<option value="{{ crop }}">

{{ crop }}

</option>

{% endfor %}

</select>

</div>

<button type="submit">

Get Recommendation

</button>

</form>

</div>

</div>

</body>

</html>
